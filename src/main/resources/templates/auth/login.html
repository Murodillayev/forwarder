<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Kirish — TG Forward Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0088cc;
            --dark-color: #1a1a1b;
            --bg-soft: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
            margin: auto;
        }

        .auth-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background: var(--dark-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            color: white;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .input-group {
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .input-group:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 136, 204, 0.1);
        }

        .input-group-text {
            background: transparent;
            border: none;
            padding-left: 0.75rem;
            color: var(--text-muted);
        }

        .form-control {
            border: none;
            height: 46px; /* Professional ixcham o'lcham */
            font-size: 0.9rem;
        }

        .form-control:focus { box-shadow: none; }

        .btn-login {
            height: 46px;
            background: var(--dark-color);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            margin-top: 0.5rem;
        }

        /* Qo'llanma qismi */
        .instruction-box {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1.5rem;
        }

        .step-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .step-number {
            background: var(--primary-color);
            color: white;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 2px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before { margin-right: 1rem; }
        .divider:not(:empty)::after { margin-left: 1rem; }

        .bot-link-card {
            background-color: #fff;
            border: 1.5px solid var(--primary-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .bot-link-card:hover {
            background-color: var(--primary-color);
            color: white !important;
        }

        .bot-link-card:hover .bot-title,
        .bot-link-card:hover .bot-sub,
        .bot-link-card:hover .text-muted {
            color: white !important;
        }

        .bot-title { font-size: 0.85rem; font-weight: 700; color: var(--primary-color); display: block; }
        .bot-sub { font-size: 0.75rem; color: var(--text-muted); }

        .badge-time {
            font-size: 0.65rem;
            font-weight: 700;
            background: #fff7ed;
            color: #c2410c;
            border: 1px solid #ffedd5;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .alert-custom {
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            border: 1px solid transparent;
        }
        .alert-custom-danger {
            background-color: #fef2f2;
            color: #991b1b;
            border-color: #fee2e2;
        }
        .alert-custom-success {
            background-color: #f0fdf4;
            color: #166534;
            border-color: #dcfce7;
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100 p-3">

<div class="auth-container">
    <div class="auth-card">
        <div class="brand-logo shadow-sm">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 01-4 4H3"/></svg>
        </div>

        <h1 class="text-center">Tizimga kirish</h1>

        <div th:if="${message}" class="alert-custom alert-custom-success">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
            <span th:text="${message}">Muvaffaqiyatli!</span>
        </div>

        <div th:if="${error != null || phoneError != null}" class="alert-custom alert-custom-danger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span th:text="${error != null ? error : phoneError}">Parol yoki telefon raqam xato!</span>
    </div>

        <form th:action="@{/auth/phone-login}" method="post">
            <div class="mb-3">
                <label class="form-label">TELEFON RAQAM</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                    </span>
                    <input type="tel"
                           id="phoneInput"
                           name="phone"
                           class="form-control"
                           placeholder="+998 (__) ___-__-__"
                           required/>
<!--                    <input type="tel" name="phone" class="form-control" placeholder="+998 90 123 45 67" required/>-->
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label class="form-label mb-0">TASDIQLASH KODI</label>
                    <span class="badge-time text-uppercase">10 daqiqa amal qiladi</span>
                </div>
                <div class="input-group">
                    <span class="input-group-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    </span>
                    <input type="text" name="code" class="form-control font-monospace fw-bold" placeholder="•••••" maxlength="5" inputmode="numeric" style="letter-spacing: 0.3rem;" required/>
                </div>
            </div>

            <button type="submit" class="btn btn-dark btn-login w-100 d-flex align-items-center justify-content-center">
                Kirish <svg class="ms-2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </form>

        <div class="divider">Parol olish tartibi</div>

        <div class="instruction-box mb-3">
            <div class="step-item">
                <div class="step-number">1</div>
                <div>Botga o'ting va <b>/start</b> bosing</div>
            </div>
            <div class="step-item">
                <div class="step-number">2</div>
                <div><b>/getpassword</b> buyrug'ini yuboring</div>
            </div>
            <div class="step-item">
                <div class="step-number">3</div>
                <div>Telefon raqamingizni botga yuboring</div>
            </div>
        </div>

        <a href="https://t.me/forwarderuzbot" target="_blank" class="bot-link-card shadow-sm">
            <div class="me-3 text-primary">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.198 2.433a2.242 2.242 0 00-2.397-.21L2.03 9.452a1.25 1.25 0 00-.105 2.257l6.505 2.72 2.72 6.505a1.25 1.25 0 002.257-.105l7.23-16.77a2.242 2.242 0 00-.21-2.397z"/><line x1="11" y1="13" x2="21" y2="3"/></svg>
            </div>
            <div class="bot-text">
                <span class="bot-title">@forwarderuzbot</span>
                <span class="bot-sub">Botga o'tish va parol olish</span>
            </div>
            <svg class="ms-auto text-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const phoneInput = document.getElementById('phoneInput');

    phoneInput.addEventListener('input', function (e) {
        // Faqat raqamlarni qoldiramiz
        let input = e.target.value.replace(/\D/g, '');

        // Agar foydalanuvchi hamma narsani o'chirib tashlasa
        if (input.length === 0) {
            e.target.value = '';
            return;
        }

        // Har doim 998 bilan boshlanishini ta'minlash
        if (!input.startsWith('998')) {
            input = '998' + input;
        }

        // Maksimal uzunlikni cheklash (+998 va 9 ta raqam = 12 ta raqam)
        input = input.substring(0, 12);

        // Yakuniy qiymatni + belgisi bilan birga yozish
        e.target.value = '+' + input;
    });

    // Inputga bosganda avtomatik +998 chiqishi uchun
    phoneInput.addEventListener('focus', function (e) {
        if (!e.target.value) {
            e.target.value = '+998';
        }
    });

    // Kursorni har doim oxirida ushlab turish (ixtiyoriy, qulaylik uchun)
    phoneInput.addEventListener('mouseup', function(e) {
        const len = e.target.value.length;
        e.target.setSelectionRange(len, len);
    });
</script>
</body>
</html>
