<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Xatolik — TG Forward Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
<div class="text-center">
    <i class="bi bi-exclamation-triangle text-warning" style="font-size:3rem;"></i>
    <h4 class="mt-3 fw-semibold">Xatolik yuz berdi</h4>
    <th:block th:if="${message == null}">
        <p class="text-muted">Nomalim xatolik</p>
    </th:block>
    <th:block th:if="${message != null}">
        <p class="text-muted" th:text="${message}">Xatolik</p>
    </th:block>
    <a href="/configs" class="btn btn-dark mt-2">
        <i class="bi bi-arrow-left me-1"></i> Orqaga
    </a>
</div>
</body>
</html>
