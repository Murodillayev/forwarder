<!DOCTYPE html>
<html lang="uz" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle != null ? pageTitle + ' — TG Forward' : 'TG Forward Bot'}">TG Forward Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/configs}">
            <i class="bi bi-arrow-repeat me-1"></i> TG Forward
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/configs}">
                        <i class="bi bi-list-ul me-1"></i>Configlar
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/configs/new}">
                        <i class="bi bi-plus-circle me-1"></i>Yangi config
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/session}">
                        <i class="bi bi-person-badge me-1"></i>Session
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center" sec:authorize="isAuthenticated()">
                <li class="nav-item me-2">
                    <span class="navbar-text text-light" th:if="${session.currentUser != null}">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${session.currentUser.displayName}">User</span>
                        <span class="badge bg-secondary ms-1"
                              th:text="${session.currentUser.planType}">FREE</span>
                    </span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/auth/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-right me-1"></i>Chiqish
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Layout wrapper -->
<div th:fragment="layout(content)">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="container py-4">
        <div th:replace="${content}"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</div>

</body>
</html>
